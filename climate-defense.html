<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ 기후 디펜스 - 1.5도를 지켜라!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
  background: #0a1628;
  color: #fff;
  overflow: hidden;
  height: 100vh;
}

#gameContainer { display: flex; height: 100vh; }

/* ===== 좌측 패널 ===== */
#sidePanel {
  width: 340px;
  min-width: 340px;
  background: linear-gradient(180deg, #162240, #0d1b30);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-right: 2px solid #2a4a7a;
  z-index: 10;
  position: relative;
}

.panel-title {
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  padding: 10px 12px;
  background: linear-gradient(135deg, #ff6b35, #e53935);
  border-radius: 10px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
  letter-spacing: 1px;
}

/* 온도 표시 */
#tempSection {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 14px;
}
#tempHeader {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
#tempHeader .temp-title { font-size: 13px; color: #8ab4f8; }
#thermoLabel { font-size: 26px; font-weight: bold; }
#tempTrack {
  height: 14px;
  background: #1a1a2e;
  border-radius: 7px;
  position: relative;
  overflow: hidden;
  border: 1px solid #333;
}
#tempFill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, #00c853, #ffeb3b, #ff5722);
  transition: width 0.5s ease;
}
#tempTarget {
  position: absolute;
  top: -2px;
  bottom: -2px;
  width: 2px;
  background: #ff4444;
  left: 60%;
  z-index: 2;
}
#tempTargetLabel {
  position: absolute;
  top: -18px;
  left: 60%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #ff6666;
  font-weight: bold;
  white-space: nowrap;
}

/* 자원 표시 */
#resourceBar {
  display: flex;
  gap: 6px;
}
.res-item {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}
.res-item .res-icon { font-size: 18px; display: block; margin-bottom: 2px; }
.res-item .res-val { font-size: 18px; font-weight: bold; display: block; }
.res-item .res-label { font-size: 10px; color: #888; display: block; margin-top: 1px; }

/* 타워 샵 */
#towerShop {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#towerShop::-webkit-scrollbar { width: 4px; }
#towerShop::-webkit-scrollbar-thumb { background: #335; border-radius: 2px; }
.shop-title { font-size: 13px; color: #8ab4f8; margin-bottom: 2px; font-weight: bold; }

.tower-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.05);
  border: 2px solid transparent;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.tower-card:hover { border-color: #4a90d9; background: rgba(74,144,217,0.1); }
.tower-card.selected { border-color: #00e676; background: rgba(0,230,118,0.1); box-shadow: 0 0 12px rgba(0,230,118,0.2); }
.tower-card.disabled { opacity: 0.35; cursor: not-allowed; }
.tower-card.disabled:hover { border-color: transparent; background: rgba(255,255,255,0.05); }

.tower-thumb {
  width: 52px;
  height: 52px;
  border-radius: 8px;
  flex-shrink: 0;
  background-color: rgba(0,0,0,0.3);
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}
.tower-info { flex: 1; min-width: 0; }
.tower-info .tower-row { display: flex; justify-content: space-between; align-items: center; }
.tower-info .tower-name { font-weight: bold; font-size: 14px; }
.tower-info .tower-cost { color: #ffd740; font-size: 14px; font-weight: bold; }
.tower-info .tower-desc { font-size: 11px; color: #999; margin-top: 2px; }
.tower-info .tower-stats { font-size: 11px; color: #7ab8ff; margin-top: 3px; }

/* 웨이브 */
#waveBox {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 12px 14px;
  text-align: center;
}
#waveText { font-size: 15px; font-weight: bold; margin-bottom: 8px; }
#startWaveBtn {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #00c853, #00e676);
  color: #000;
  transition: all 0.2s;
  letter-spacing: 1px;
}
#startWaveBtn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,200,83,0.4); }
#startWaveBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* 스킬 */
#skillBox {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 10px 12px;
}
.skill-btn {
  flex: 1;
  padding: 8px 6px;
  background: rgba(100,150,255,0.1);
  border: 1px solid rgba(100,150,255,0.3);
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: all 0.2s;
}
.skill-btn:hover:not(:disabled) { background: rgba(100,150,255,0.25); border-color: #4a90d9; }
.skill-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.skill-btn.skill-active { background: rgba(255,215,64,0.2); border-color: #ffd740; box-shadow: 0 0 10px rgba(255,215,64,0.3); }
.skill-icon { font-size: 20px; }
.skill-label { font-size: 11px; font-weight: bold; }
.skill-cost { font-size: 10px; color: #8ab4f8; }

/* 캔버스 */
#gameCanvas { flex: 1; display: block; cursor: crosshair; }

/* 오버레이 */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  justify-content: center; align-items: center;
}
#overlay.show { display: flex; }
#overlayContent {
  background: linear-gradient(135deg, #1a2a4a, #0d1b30);
  border: 2px solid #4a90d9;
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  max-width: 620px;
  animation: popIn 0.4s ease;
}
@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#overlayContent h2 { font-size: 28px; margin-bottom: 15px; }
#overlayContent p { font-size: 16px; color: #ccc; margin-bottom: 10px; line-height: 1.6; }
#overlayContent button {
  padding: 12px 30px; font-size: 16px; font-weight: bold;
  border: none; border-radius: 10px; cursor: pointer; margin: 5px;
  transition: transform 0.2s;
}
#overlayContent button:hover { transform: scale(1.05); }
.btn-primary { background: linear-gradient(135deg, #00c853, #00e676); color: #000; }
.btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }

/* 퀴즈 */
.quiz-choices { display: flex; flex-direction: column; gap: 8px; }
.quiz-choice {
  text-align: left; padding: 10px 14px; font-size: 14px; color: #fff;
  background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.quiz-choice:hover:not(:disabled) { background: rgba(74,144,217,0.2); border-color: #4a90d9; }
.quiz-choice:disabled { cursor: not-allowed; opacity: 0.5; }
.quiz-choice.quiz-correct { background: rgba(0,200,83,0.25); border-color: #00e676; opacity: 1; }
.quiz-choice.quiz-wrong { background: rgba(255,82,82,0.2); border-color: #ff5252; }

/* 튜토리얼 */
.tut-steps { text-align: left; margin: 15px 0; }
.tut-step {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 12px; margin-bottom: 8px;
  background: rgba(255,255,255,0.05); border-radius: 12px;
  border-left: 4px solid #4a90d9;
}
.tut-step .tut-num {
  min-width: 32px; height: 32px; background: #4a90d9; color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 15px; flex-shrink: 0;
}
.tut-step .tut-body h4 { font-size: 15px; color: #fff; margin-bottom: 3px; }
.tut-step .tut-body p { font-size: 13px; color: #aab; margin: 0; line-height: 1.5; }
.tut-tower-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
.tut-tower-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; background: rgba(255,255,255,0.06); border-radius: 8px; font-size: 13px;
}
.tut-tower-item .tut-icon { font-size: 20px; }
.tut-tower-item .tut-info { text-align: left; }
.tut-tower-item .tut-info strong { color: #fff; font-size: 13px; }
.tut-tower-item .tut-info span { color: #999; font-size: 11px; }
.tut-goal-box { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
.tut-goal { text-align: center; padding: 10px 18px; border-radius: 10px; }
.tut-goal .tut-goal-icon { font-size: 28px; }
.tut-goal .tut-goal-label { font-size: 12px; color: #aaa; margin-top: 2px; }
.tut-goal .tut-goal-value { font-size: 15px; font-weight: bold; }
.tut-page-dots { display: flex; justify-content: center; gap: 8px; margin: 12px 0 5px; }
.tut-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s; }
.tut-dot.active { background: #4a90d9; transform: scale(1.3); }

/* 배치 안내 */
#placementHint {
  display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,230,118,0.2); border: 1px solid #00e676;
  padding: 10px 25px; border-radius: 20px; font-size: 14px;
  z-index: 50; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* 피해 플래시 */
.damage-flash {
  position: fixed; inset: 0; background: rgba(255,0,0,0.15);
  pointer-events: none; z-index: 90; animation: flashOut 0.5s ease forwards;
}
@keyframes flashOut { to { opacity: 0; } }

/* 로딩 */
#loadingScreen {
  position: fixed; inset: 0; background: #0a1628;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; font-size: 20px; gap: 16px;
}
#loadingBar { width: 200px; height: 6px; background: #1a2a4a; border-radius: 3px; overflow: hidden; }
#loadingFill { height: 100%; width: 0%; background: #00e676; transition: width 0.3s; border-radius: 3px; }
</style>
</head>
<body>

<div id="loadingScreen">
  <div>🛡️ 기후 디펜스</div>
  <div style="font-size:14px; color:#888">이미지 로딩 중...</div>
  <div id="loadingBar"><div id="loadingFill"></div></div>
</div>

<div id="gameContainer" style="display:none">
  <div id="sidePanel">
    <div class="panel-title">🛡️ 1.5도를 지켜라!</div>

    <div id="tempSection">
      <div id="tempHeader">
        <span class="temp-title">🌡️ 지구 기온 상승</span>
        <span id="thermoLabel" style="color:#00c853">+0.5°C</span>
      </div>
      <div id="tempTrack">
        <div id="tempFill" style="width:20%"></div>
        <div id="tempTarget"></div>
        <span id="tempTargetLabel">1.5°C</span>
      </div>
    </div>

    <div id="resourceBar">
      <div class="res-item">
        <span class="res-icon">💰</span>
        <span class="res-val" id="budgetDisplay">300억</span>
        <span class="res-label">예산</span>
      </div>
      <div class="res-item">
        <span class="res-icon">🔬</span>
        <span class="res-val" id="researchDisplay">0</span>
        <span class="res-label">연구력</span>
      </div>
      <div class="res-item">
        <span class="res-icon">💀</span>
        <span class="res-val" id="leakedDisplay">0</span>
        <span class="res-label">통과 CO₂</span>
      </div>
    </div>

    <div id="towerShop">
      <div class="shop-title">🏗️ 감축 기술 선택</div>
    </div>

    <div id="skillBox">
      <div class="shop-title">⚡ 특수 기술</div>
      <div style="display:flex; gap:6px;">
        <button class="skill-btn" id="skillSlow" onclick="useSkillSlow()">
          <span class="skill-icon">🕐</span>
          <span class="skill-label">전체 감속</span>
          <span class="skill-cost">🔬15</span>
        </button>
        <button class="skill-btn" id="skillUpgrade" onclick="useSkillUpgrade()">
          <span class="skill-icon">⬆️</span>
          <span class="skill-label">타워 업그레이드</span>
          <span class="skill-cost">🔬10</span>
        </button>
      </div>
    </div>

    <div id="waveBox">
      <div id="waveText">웨이브 1 / 10</div>
      <button id="startWaveBtn" onclick="startWave()">▶ 웨이브 시작</button>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>
</div>

<div id="placementHint">🏗️ 맵에서 경로 옆 빈 공간을 클릭하여 배치하세요 (우클릭: 취소)</div>

<div id="overlay">
  <div id="overlayContent"></div>
</div>

function extractSprites() {
  const c = document.createElement('canvas');
  const cx = c.getContext('2d');

  if (imgTowers.naturalWidth) {
    const tw = imgTowers.naturalWidth / 5;
    const th = imgTowers.naturalHeight;
    c.width = tw; c.height = th;
    for (let i = 0; i < 5; i++) {
      cx.clearRect(0, 0, tw, th);
      cx.drawImage(imgTowers, i * tw, 0, tw, th, 0, 0, tw, th);
      towerDataURLs[i] = c.toDataURL();
    }
  }

  if (imgEnemies.naturalWidth) {
    const ew = imgEnemies.naturalWidth / 3;
    const eh = imgEnemies.naturalHeight;
    c.width = ew; c.height = eh;
    for (let i = 0; i < 3; i++) {
      cx.clearRect(0, 0, ew, eh);
      cx.drawImage(imgEnemies, i * ew, 0, ew, eh, 0, 0, ew, eh);
      enemyDataURLs[i] = c.toDataURL();
    }
  }

  if (imgExtras.naturalWidth) {
    const xw = imgExtras.naturalWidth / 4;
    const xh = imgExtras.naturalHeight;
    c.width = xw; c.height = xh;
    for (let i = 0; i < 4; i++) {
      cx.clearRect(0, 0, xw, xh);
      cx.drawImage(imgExtras, i * xw, 0, xw, xh, 0, 0, xw, xh);
      extrasDataURLs[i] = c.toDataURL();
    }
  }
}

    {x:w*0.43, y:h*0.57}, {x:w*0.43, y:h*0.25},
    {x:w*0.46, y:h*0.2}, {x:w*0.65, y:h*0.2},
    {x:w*0.68, y:h*0.23}, {x:w*0.68, y:h*0.7},
    {x:w*0.71, y:h*0.75}, {x:w*0.88, y:h*0.75},
    {x:w*0.9, y:h*0.72}, {x:w*0.9, y:h*0.4},
    {x:w*0.92, y:h*0.37}, {x:w+30, y:h*0.37}
  ];
}
let path = [];

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  path = buildPath();
}
window.addEventListener('resize', resizeCanvas);

function getPathLength() {
  let len = 0;
  for (let i = 1; i < path.length; i++)
    len += Math.hypot(path[i].x - path[i-1].x, path[i].y - path[i-1].y);
  return len;
}

function getPosOnPath(dist) {
  let remaining = dist;
  for (let i = 1; i < path.length; i++) {
    const segLen = Math.hypot(path[i].x - path[i-1].x, path[i].y - path[i-1].y);
    if (remaining <= segLen) {
      const t = remaining / segLen;
      return { x: path[i-1].x + (path[i].x - path[i-1].x)*t, y: path[i-1].y + (path[i].y - path[i-1].y)*t };
    }
    remaining -= segLen;
  }
  return { x: path[path.length-1].x, y: path[path.length-1].y };
}

function isOnPath(x, y, margin = 35) {
  for (let i = 1; i < path.length; i++) {
    const ax=path[i-1].x, ay=path[i-1].y, bx=path[i].x, by=path[i].y;
    const lenSq = (bx-ax)**2 + (by-ay)**2;
    let t = Math.max(0, Math.min(1, ((x-ax)*(bx-ax)+(y-ay)*(by-ay))/lenSq));
    if (Math.hypot(x-(ax+t*(bx-ax)), y-(ay+t*(by-ay))) < margin) return true;
  }
  return false;
}

function isTowerAt(x, y, margin = 40) {
  return gameState.towers.some(t => Math.hypot(t.x-x, t.y-y) < margin);
}

function renderShop() {
  const shop = document.getElementById('towerShop');
  let html = '<div class="shop-title">🏗️ 감축 기술 선택</div>';
  TOWER_TYPES.forEach((t, idx) => {
    if (t.locked && !gameState.fusionUnlocked) {
      html += `<div class="tower-card ${gameState.research>=25?'':'disabled'}"
                    onclick="unlockFusion()" title="연구력 25 소모하여 해금">
        <div class="tower-thumb" style="display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(0,229,255,0.1)">🔒</div>
        <div class="tower-info">
          <div class="tower-row">
            <span class="tower-name">??? 신기술</span>
            <span class="tower-cost" style="color:#00E5FF">🔬25로 해금</span>
          </div>
          <div class="tower-desc">연구력을 모아 새로운 기술을 해금하세요!</div>
          <div class="tower-stats">연구력: ${gameState.research} / 25</div>
        </div>
      </div>`;
      return;
    }
    if (t.locked && !gameState.fusionUnlocked) return;
    const canAfford = gameState.budget >= t.cost;
    const selected = gameState.selectedTower === t.id;
    const thumbSrc = t.spriteIdx >= 0 ? (towerDataURLs[t.spriteIdx] || '') : '';
    const thumbStyle = thumbSrc ? `background-image:url('${thumbSrc}')` :
      (t.id==='fusion' ? 'display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(0,229,255,0.15)' : '');
    const thumbContent = t.id==='fusion' ? '⚛️' : '';
    html += `<div class="tower-card ${selected?'selected':''} ${!canAfford?'disabled':''}"
                  onclick="selectTower('${t.id}')">
      <div class="tower-thumb" style="${thumbStyle}">${thumbContent}</div>
      <div class="tower-info">
        <div class="tower-row">
          <span class="tower-name">${t.name}</span>
          <span class="tower-cost">${t.cost}억</span>
        </div>
        <div class="tower-desc">${t.desc}</div>
        <div class="tower-stats">공격력 ${t.damage} · 범위 ${t.range} · 속도 ${(60/t.fireRate).toFixed(1)}/s</div>
      </div>
    </div>`;
  });
  shop.innerHTML = html;
}

function unlockFusion() {
  if (gameState.research < 25 || gameState.fusionUnlocked) return;
  gameState.research -= 25;
  gameState.fusionUnlocked = true;
  TOWER_TYPES.find(t => t.id==='fusion').locked = false;
  renderShop();
  updateUI();
  for (let i=0; i<20; i++) {
    gameState.particles.push({
      x: canvas.width/2, y: canvas.height/2,
      vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
      life:40, color:'#00E5FF', size:5
    });
  }
}

function selectTower(id) {
  const type = TOWER_TYPES.find(t => t.id === id);
  if (!type || type.locked || gameState.budget < type.cost) return;
  gameState.selectedTower = gameState.selectedTower === id ? null : id;
  document.getElementById('placementHint').style.display = gameState.selectedTower ? 'block' : 'none';
  renderShop();
}

// ===== 캔버스 클릭 → 타워 배치 / 업그레이드 =====
canvas.addEventListener('click', (e) => {
  if (gameState.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;

  // 업그레이드 모드 → 타워 클릭 시 업그레이드
  if (gameState.upgradeMode) {
    const clicked = gameState.towers.find(t => Math.hypot(t.x-x, t.y-y) < 30);
    const upgCost = clicked ? getUpgradeCost(clicked.level) : 99;
    if (clicked && clicked.level < 3 && gameState.research >= upgCost) {
      clicked.level++;
      clicked.damage = Math.round(clicked.damage * 1.5);
      clicked.range = Math.round(clicked.range * 1.12);
      clicked.fireRate = Math.max(10, Math.round(clicked.fireRate * 0.85));
      gameState.research -= upgCost;
      for (let i=0; i<15; i++) {
        gameState.particles.push({
          x:clicked.x, y:clicked.y,
          vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6,
          life:35, color:'#ffd740', size:4
        });
      }
      gameState.upgradeMode = false;
      const btn = document.getElementById('skillUpgrade');
      if (btn) btn.classList.remove('skill-active');
      updateUI();
    }
    return;
  }

  // 타워 선택 안 된 상태
  if (!gameState.selectedTower) return;

  // 타워 배치
  if (isOnPath(x,y) || isTowerAt(x,y)) return;
  if (x<10||y<10||x>canvas.width-10||y>canvas.height-10) return;

  const type = TOWER_TYPES.find(t => t.id === gameState.selectedTower);
  if (!type || gameState.budget < type.cost) return;

  gameState.budget -= type.cost;
  gameState.towers.push({
    x, y, type: type.id,
    spriteIdx: type.spriteIdx, projSpriteIdx: type.projSpriteIdx,
    damage: type.damage, range: type.range, fireRate: type.fireRate,
    color: type.color, projColor: type.projColor,
    special: type.special || null,
    cooldown: 0, level: 1, kills: 0
  });

  for (let i = 0; i < 12; i++) {
    gameState.particles.push({
      x, y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5,
      life:30, color:type.color, size:4
    });
  }

  gameState.selectedTower = null;
  document.getElementById('placementHint').style.display = 'none';
  renderShop();
  updateUI();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  gameState.selectedTower = null;
  gameState.upgradeMode = false;
  document.getElementById('placementHint').style.display = 'none';
  const btn = document.getElementById('skillUpgrade');
  if (btn) btn.classList.remove('skill-active');
  renderShop();
});

// ===== 특수 기술 =====
function useSkillSlow() {
  if (gameState.research < 15 || gameState.globalSlowTimer > 0) return;
  gameState.research -= 15;
  gameState.globalSlowTimer = 240;
  updateUI();
}

function useSkillUpgrade() {
  const minCost = gameState.towers.filter(t => t.level < 3).map(t => getUpgradeCost(t.level)).sort((a,b)=>a-b)[0] || 99;
  if (gameState.research < minCost) return;
  if (gameState.towers.filter(t => t.level < 3).length === 0) return;
  gameState.upgradeMode = !gameState.upgradeMode;
  gameState.selectedTower = null;
  document.getElementById('placementHint').style.display = gameState.upgradeMode ? 'none' : 'none';
  const btn = document.getElementById('skillUpgrade');
  if (btn) btn.classList.toggle('skill-active', gameState.upgradeMode);
  renderShop();
}

function updateSkillButtons() {
  const slowBtn = document.getElementById('skillSlow');
  const upgBtn = document.getElementById('skillUpgrade');
  if (slowBtn) slowBtn.disabled = gameState.research < 15 || gameState.globalSlowTimer > 0;
  const minUpgCost = gameState.towers.filter(t => t.level < 3).map(t => getUpgradeCost(t.level)).sort((a,b)=>a-b)[0] || 99;
  if (upgBtn) upgBtn.disabled = gameState.research < minUpgCost || gameState.towers.filter(t => t.level < 3).length === 0;
}

function startWave() {
  if (gameState.waveActive || gameState.wave >= gameState.maxWave || gameState.gameOver) return;
  showQuiz(gameState.wave);
}

function showQuiz(waveIdx) {
  quizWrongCount = 0;
  const quiz = QUIZZES[waveIdx % QUIZZES.length];
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('overlayContent');

  let choicesHtml = '';
  quiz.c.forEach((c, i) => {
    choicesHtml += `<button class="quiz-choice" id="qc${i}" onclick="checkQuizAnswer(${i}, ${quiz.a})">${i+1}. ${c}</button>`;
  });

  content.innerHTML = `
    <h2 style="font-size:20px">📝 웨이브 ${waveIdx+1} 환경 퀴즈</h2>
    <p style="font-size:13px; color:#8ab4f8; margin-bottom:5px">맞히면 기본 속도! 틀릴 때마다 이동속도 +10%</p>
    <div style="background:rgba(255,255,255,0.05); border-radius:12px; padding:16px; margin:12px 0; text-align:left;">
      <p style="font-size:16px; color:#fff; font-weight:bold; margin-bottom:12px; line-height:1.5">${quiz.q}</p>
      <div class="quiz-choices">${choicesHtml}</div>
    </div>
    <p id="quizFeedback" style="min-height:24px; font-size:14px;"></p>
  `;
  overlay.classList.add('show');
}

function checkQuizAnswer(selected, correct) {
  const feedback = document.getElementById('quizFeedback');
  if (selected === correct) {
    feedback.style.color = '#00e676';
    feedback.textContent = quizWrongCount === 0 ? '✅ 정답! 기본 속도로 시작합니다!' : `✅ 정답! 하지만 ${quizWrongCount}번 틀려서 이동속도 +${quizWrongCount*10}%`;
    document.querySelectorAll('.quiz-choice').forEach(b => b.disabled = true);
    document.getElementById('qc'+correct).classList.add('quiz-correct');
    setTimeout(() => {
      document.getElementById('overlay').classList.remove('show');
      launchWave(quizWrongCount);
    }, 1500);
  } else {
    quizWrongCount++;
    feedback.style.color = '#ff5252';
    feedback.textContent = `❌ 틀렸습니다! (${quizWrongCount}번 오답 — 이동속도 +${quizWrongCount*10}%) 다시 골라보세요!`;
    document.getElementById('qc'+selected).classList.add('quiz-wrong');
    document.getElementById('qc'+selected).disabled = true;
  }
}

function launchWave(wrongCount) {
  const wave = WAVES[gameState.wave];
  const speedMult = 1 + wrongCount * 0.1;
  const actualCount = wave.count;

  gameState.waveActive = true;
  gameState.spawnQueue = [];

  for (let i = 0; i < actualCount; i++) {
    let hp=wave.hp, speed=wave.speed * speedMult, size=10, color='#ff5252', type='normal';
    let enemySpriteIdx = 0;

    if (wave.hasBoss && i === actualCount-1) {
      hp*=3.5; speed*=0.5; size=22; color='#d500f9'; type='boss'; enemySpriteIdx=2;
    } else if (wave.hasTank && i%5===0) {
      hp*=2; speed*=0.7; size=15; color='#ff6e40'; type='tank'; enemySpriteIdx=3;
    } else if (wave.hasFast && i%3===0) {
      hp*=0.5; speed*=1.6; size=7; color='#ffd740'; type='fast'; enemySpriteIdx=1;
    }

    gameState.spawnQueue.push({
      hp, maxHp:hp, speed, size, color, type, enemySpriteIdx,
      dist:0, slowed:0, delay:i*wave.interval
    });
  }
  gameState.spawnTimer = 0;
  gameState.waveEnemiesAlive = actualCount;
  document.getElementById('startWaveBtn').disabled = true;
  const extraText = wrongCount > 0 ? ` (이동속도 +${wrongCount*10}%)` : '';
  document.getElementById('waveText').textContent = `웨이브 ${gameState.wave+1} / ${gameState.maxWave} — ${wave.label}${extraText}`;
}

// ===== 게임 로직 =====
function updateSpawning() {
  if (!gameState.waveActive) return;
  gameState.spawnTimer++;
  const toSpawn = gameState.spawnQueue.filter(e => e.delay <= gameState.spawnTimer);
  toSpawn.forEach(e => {
    gameState.enemies.push({
      hp:e.hp, maxHp:e.maxHp, speed:e.speed, baseSpeed:e.speed,
      size:e.size, color:e.color, type:e.type,
      enemySpriteIdx:e.enemySpriteIdx, dist:0, slowed:0
    });
  });
  gameState.spawnQueue = gameState.spawnQueue.filter(e => e.delay > gameState.spawnTimer);
}

function updateEnemies() {
  if (gameState.globalSlowTimer > 0) gameState.globalSlowTimer--;
  const pathLen = getPathLength();
  for (let i = gameState.enemies.length-1; i >= 0; i--) {
    const e = gameState.enemies[i];
    e.speed = e.slowed > 0 ? (e.slowed--, e.baseSpeed*0.7) : e.baseSpeed;
    if (gameState.globalSlowTimer > 0) e.speed *= 0.4;
    e.dist += e.speed;

    if (e.dist >= pathLen) {
      gameState.enemies.splice(i, 1);
      gameState.leaked++;
      gameState.temperature += (e.type==='boss'?0.3 : e.type==='tank'?0.12 : 0.08);
      gameState.waveEnemiesAlive--;
      const flash = document.createElement('div');
      flash.className = 'damage-flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 500);
      if (gameState.temperature >= 2.5) endGame(false);
    }
  }
}

function updateTowers() {
  gameState.towers.forEach(tower => {
    if (tower.cooldown > 0) { tower.cooldown--; return; }
    let target = null, maxDist = -1;
    gameState.enemies.forEach(e => {
      const pos = getPosOnPath(e.dist);
      const d = Math.hypot(tower.x-pos.x, tower.y-pos.y);
      if (d <= tower.range && e.dist > maxDist) { target=e; maxDist=e.dist; }
    });
    if (target) {
      const pos = getPosOnPath(target.dist);
      gameState.projectiles.push({
        x:tower.x, y:tower.y, tx:pos.x, ty:pos.y, target,
        damage:tower.damage, speed:6, color:tower.projColor,
        special:tower.special, projSpriteIdx:tower.projSpriteIdx
      });
      tower.cooldown = tower.fireRate;
      if (tower.special==='research' && Math.random()<0.3) gameState.research++;
    }
  });
}

function updateProjectiles() {
  for (let i = gameState.projectiles.length-1; i >= 0; i--) {
    const p = gameState.projectiles[i];
    const pos = (p.target && gameState.enemies.includes(p.target)) ? getPosOnPath(p.target.dist) : {x:p.tx, y:p.ty};
    const dx=pos.x-p.x, dy=pos.y-p.y, dist=Math.hypot(dx,dy);

    if (dist < 8) {
      if (p.target && gameState.enemies.includes(p.target)) {
        p.target.hp -= p.damage;
        if (p.special==='slow') p.target.slowed = 90;
        if (p.special==='splash') {
          gameState.enemies.forEach(other => {
            if (other !== p.target) {
              const op = getPosOnPath(other.dist);
              if (Math.hypot(op.x-p.x, op.y-p.y) < 60) {
                other.hp -= Math.round(p.damage * 0.4);
              }
            }
          });
        }
        for (let j=0; j<4; j++) {
          gameState.particles.push({
            x:p.x, y:p.y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3,
            life:15, color:p.color, size:3
          });
        }
        if (p.target.hp <= 0) {
          const idx = gameState.enemies.indexOf(p.target);
          if (idx !== -1) {
            for (let j=0; j<12; j++) {
              gameState.particles.push({
                x:pos.x, y:pos.y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6,
                life:30, color:p.target.color, size:4+Math.random()*3
              });
            }
            gameState.enemies.splice(idx, 1);
            gameState.waveEnemiesAlive--;
            gameState.budget += (p.target.type==='boss'?60 : p.target.type==='tank'?20 : 10);
            gameState.totalKills++;
          }
        }
      }
      gameState.projectiles.splice(i, 1);
    } else {
      p.x += (dx/dist)*p.speed;
      p.y += (dy/dist)*p.speed;
    }
  }
}

function updateParticles() {
  for (let i = gameState.particles.length-1; i >= 0; i--) {
    const p = gameState.particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    p.vy += 0.05;
    if (p.life <= 0) gameState.particles.splice(i, 1);
  }
}

function checkWaveEnd() {
  if (!gameState.waveActive) return;
  if (gameState.spawnQueue.length === 0 && gameState.enemies.length === 0) {
    gameState.waveActive = false;
    gameState.wave++;
    gameState.budget += WAVES[gameState.wave-1].reward;
    if (gameState.wave >= gameState.maxWave) {
      endGame(true);
    } else {
      document.getElementById('startWaveBtn').disabled = false;
      document.getElementById('waveText').textContent = `웨이브 ${gameState.wave+1} / ${gameState.maxWave}`;
      renderShop();
      updateUI();
    }
  }
}

// ===== 그리기 =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawPath();
  drawTowerRanges();
  drawTowers();
  drawEnemies();
  drawProjectiles();
  drawParticles();
  drawPlacementPreview();
}

function drawBackground() {
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#0d1b2a'); g.addColorStop(1,'#1b2838');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let x=0; x<canvas.width; x+=40)
    for (let y=0; y<canvas.height; y+=40)
      ctx.fillRect(x,y,1,1);
}

function drawPath() {
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for (let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 54; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.stroke();

  ctx.strokeStyle = 'rgba(80,130,200,0.12)';
  ctx.lineWidth = 44; ctx.stroke();

  ctx.strokeStyle = 'rgba(100,160,220,0.2)';
  ctx.lineWidth = 2; ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);

  ctx.font = 'bold 12px Segoe UI'; ctx.textAlign = 'start';
  ctx.fillStyle = '#00e676';
  ctx.fillText('CO₂ 진입 →', path[0].x+10, path[0].y-22);
  const last = path[path.length-1];
  ctx.fillStyle = '#ff5252';
  ctx.fillText('→ 대기 방출 🌡️', last.x-130, last.y-22);
}

function drawTowerRanges() {
  if (gameState.selectedTower) return;
  gameState.towers.forEach(t => {
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.range, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,150,255,0.03)';
    ctx.fill();
  });
}

function drawTowers() {
  const hasTowerSprites = imgTowers && imgTowers.naturalWidth;
  gameState.towers.forEach(t => {
    const towerSize = 56;
    if (t.type === 'fusion') {
      // 핵융합: 글로우 원 + 이모지
      ctx.save();
      ctx.beginPath();
      ctx.arc(t.x, t.y, 24, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,229,255,0.15)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(t.x, t.y, 18, 0, Math.PI*2);
      const glow = ctx.createRadialGradient(t.x,t.y,4,t.x,t.y,18);
      glow.addColorStop(0,'rgba(0,229,255,0.9)');
      glow.addColorStop(1,'rgba(0,229,255,0.1)');
      ctx.fillStyle = glow; ctx.fill();
      ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 2; ctx.stroke();
      ctx.font = '18px Segoe UI Emoji'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText('⚛️', t.x, t.y);
      ctx.restore();
    } else if (hasTowerSprites && t.spriteIdx >= 0) {
      const sw = imgTowers.naturalWidth/5, sh = imgTowers.naturalHeight;
      ctx.drawImage(imgTowers, t.spriteIdx*sw, 0, sw, sh,
                    t.x-towerSize/2, t.y-towerSize/2, towerSize, towerSize);
    } else {
      ctx.beginPath();
      ctx.arc(t.x, t.y, 16, 0, Math.PI*2);
      ctx.fillStyle = t.color; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }
    // 레벨 표시
    if (t.level > 1) {
      ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const stars = '★'.repeat(t.level-1);
      ctx.fillStyle = '#000';
      ctx.fillText(stars, t.x+1, t.y-towerSize/2+1);
      ctx.fillStyle = '#ffd740';
      ctx.fillText(stars, t.x, t.y-towerSize/2);
    }
  });
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

function drawEnemies() {
  const hasEnemySprites = imgEnemies && imgEnemies.naturalWidth;
  const hasExtraSprites = imgExtras && imgExtras.naturalWidth;

  gameState.enemies.forEach(e => {
    const pos = getPosOnPath(e.dist);

    if (e.slowed > 0) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, e.size+8, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,183,77,0.15)'; ctx.fill();
    }

    const sizes = { normal:36, fast:28, tank:44, boss:64 };
    const drawSize = sizes[e.type] || 36;

    let drawn = false;
    if (e.type === 'tank' && hasExtraSprites) {
      const xw = imgExtras.naturalWidth/4, xh = imgExtras.naturalHeight;
      ctx.drawImage(imgExtras, 0, 0, xw, xh, pos.x-drawSize/2, pos.y-drawSize/2, drawSize, drawSize);
      drawn = true;
    } else if (hasEnemySprites && e.enemySpriteIdx < 3) {
      const ew = imgEnemies.naturalWidth/3, eh = imgEnemies.naturalHeight;
      ctx.drawImage(imgEnemies, e.enemySpriteIdx*ew, 0, ew, eh,
                    pos.x-drawSize/2, pos.y-drawSize/2, drawSize, drawSize);
      drawn = true;
    }

    if (!drawn) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, e.size, 0, Math.PI*2);
      ctx.fillStyle = e.color; ctx.fill();
      ctx.font = '9px Segoe UI'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      ctx.fillText('CO₂', pos.x, pos.y+3); ctx.textAlign = 'start';
    }

    // HP bar
    const hpRatio = e.hp / e.maxHp;
    const barW = drawSize * 0.8;
    const barY = pos.y - drawSize/2 - 6;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(pos.x-barW/2-1, barY-1, barW+2, 6);
    ctx.fillStyle = hpRatio>0.5 ? '#00e676' : hpRatio>0.25 ? '#ffd740' : '#ff5252';
    ctx.fillRect(pos.x-barW/2, barY, barW*hpRatio, 4);
  });
}

function drawProjectiles() {
  const hasExtraSprites = imgExtras && imgExtras.naturalWidth;
  gameState.projectiles.forEach(p => {
    const projSize = 22;
    if (hasExtraSprites && p.projSpriteIdx >= 1 && p.projSpriteIdx <= 3) {
      const xw = imgExtras.naturalWidth/4, xh = imgExtras.naturalHeight;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(frameCount * 0.1);
      ctx.drawImage(imgExtras, p.projSpriteIdx*xw, 0, xw, xh,
                    -projSize/2, -projSize/2, projSize, projSize);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
  });
}

function drawParticles() {
  gameState.particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*(p.life/30), 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPlacementPreview() {
  if (!mousePos) return;

  // 업그레이드 모드: 호버 중인 타워에 업그레이드 정보 표시
  if (gameState.upgradeMode) {
    const hovered = gameState.towers.find(t => Math.hypot(t.x-mousePos.x, t.y-mousePos.y) < 30);
    if (hovered) {
      // 범위 미리보기 (업그레이드 후 범위)
      const newRange = Math.round(hovered.range * 1.12);
      ctx.beginPath();
      ctx.arc(hovered.x, hovered.y, newRange, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,215,64,0.3)';
      ctx.fillStyle = 'rgba(255,215,64,0.06)';
      ctx.lineWidth = 1.5; ctx.fill(); ctx.stroke();
      // 현재 범위
      ctx.beginPath();
      ctx.arc(hovered.x, hovered.y, hovered.range, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

      ctx.textAlign = 'center';
      if (hovered.level >= 3) {
        ctx.font = 'bold 13px Segoe UI';
        ctx.fillStyle = '#888';
        ctx.fillText('이미 최대 레벨 (Lv.3)', hovered.x, hovered.y + 40);
      } else {
        const nd = Math.round(hovered.damage * 1.5);
        const nr = newRange;
        const nf = (60 / Math.max(10, Math.round(hovered.fireRate * 0.85))).toFixed(1);
        const cf = (60 / hovered.fireRate).toFixed(1);
        // 배경 박스
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        const bx = hovered.x - 100, by = hovered.y + 30;
        ctx.fillRect(bx, by, 200, 52);
        ctx.strokeStyle = '#ffd740'; ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, 200, 52);
        // 텍스트
        ctx.font = 'bold 12px Segoe UI';
        ctx.fillStyle = '#ffd740';
        const uc = getUpgradeCost(hovered.level);
        ctx.fillText(`Lv.${hovered.level} → Lv.${hovered.level+1}  (🔬${uc})`, hovered.x, by + 15);
        ctx.font = '11px Segoe UI';
        ctx.fillStyle = '#fff';
        ctx.fillText(`공격력 ${hovered.damage} → ${nd}  ·  범위 ${hovered.range} → ${nr}`, hovered.x, by + 32);
        ctx.fillStyle = '#aaa';
        ctx.fillText(`속도 ${cf}/s → ${nf}/s`, hovered.x, by + 46);
      }
      ctx.textAlign = 'start';
    } else {
      ctx.font = 'bold 13px Segoe UI'; ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd740';
      ctx.fillText('업그레이드할 타워를 클릭하세요', canvas.width/2, canvas.height - 30);
      ctx.textAlign = 'start';
    }
    return;
  }

  // 타워 선택 안 된 상태
  if (!gameState.selectedTower) return;

  const type = TOWER_TYPES.find(t => t.id === gameState.selectedTower);
  if (!type) return;
  const valid = !isOnPath(mousePos.x, mousePos.y) && !isTowerAt(mousePos.x, mousePos.y);

  ctx.beginPath();
  ctx.arc(mousePos.x, mousePos.y, type.range, 0, Math.PI*2);
  ctx.strokeStyle = valid ? 'rgba(0,230,118,0.3)' : 'rgba(255,82,82,0.3)';
  ctx.fillStyle = valid ? 'rgba(0,230,118,0.06)' : 'rgba(255,82,82,0.06)';
  ctx.lineWidth = 1; ctx.fill(); ctx.stroke();

  const hasTowerSprites = imgTowers && imgTowers.naturalWidth;
  if (hasTowerSprites && type.spriteIdx >= 0) {
    const sw = imgTowers.naturalWidth/5, sh = imgTowers.naturalHeight;
    ctx.globalAlpha = valid ? 0.7 : 0.3;
    ctx.drawImage(imgTowers, type.spriteIdx*sw, 0, sw, sh,
                  mousePos.x-28, mousePos.y-28, 56, 56);
    ctx.globalAlpha = 1;
  } else {
    ctx.beginPath();
    ctx.arc(mousePos.x, mousePos.y, 13, 0, Math.PI*2);
    ctx.fillStyle = valid ? type.color : 'rgba(255,82,82,0.5)';
    ctx.globalAlpha = 0.6; ctx.fill(); ctx.globalAlpha = 1;
  }
}

let mousePos = null;
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mousePos = { x: e.clientX-rect.left, y: e.clientY-rect.top };
});

// ===== UI 업데이트 =====
let lastBudget = -1, lastResearch = -1;
function updateUI() {
  document.getElementById('budgetDisplay').textContent = gameState.budget + '억';
  document.getElementById('researchDisplay').textContent = gameState.research;
  document.getElementById('leakedDisplay').textContent = gameState.leaked;

  const temp = gameState.temperature;
  const label = document.getElementById('thermoLabel');
  label.textContent = `+${temp.toFixed(1)}°C`;
  label.style.color = temp<1.0 ? '#00c853' : temp<1.5 ? '#ffd740' : '#ff5252';
  document.getElementById('tempFill').style.width = Math.min(temp/2.5*100, 100) + '%';

  if (lastBudget !== gameState.budget || lastResearch !== gameState.research) {
    lastBudget = gameState.budget;
    lastResearch = gameState.research;
    renderShop();
  }
  updateSkillButtons();
}

// ===== 게임 종료 =====
function endGame(won) {
  gameState.gameOver = true;
  const content = document.getElementById('overlayContent');
  let grade, msg, detail;
  if (won) {
    const temp = gameState.temperature;
    if (temp<=1.5)      { grade='S'; msg='🏆 완벽한 방어! 1.5도를 지켰습니다!'; detail=`최종 기온 상승: +${temp.toFixed(2)}°C<br>파리협정 목표 달성!`; }
    else if (temp<=1.8) { grade='A'; msg='🥈 훌륭합니다! 거의 막아냈습니다.'; detail=`최종 기온 상승: +${temp.toFixed(2)}°C<br>1.5도를 약간 넘었지만 선방!`; }
    else if (temp<=2.0) { grade='B'; msg='😅 아슬아슬하게 버텼습니다.'; detail=`최종 기온 상승: +${temp.toFixed(2)}°C<br>2도 이내 유지, 하지만 위험합니다.`; }
    else                { grade='C'; msg='⚠️ 목표를 넘겼습니다.'; detail=`최종 기온 상승: +${temp.toFixed(2)}°C<br>기후 위기가 심화됩니다.`; }
  } else {
    grade='F'; msg='🌋 기후 재앙 발생!'; detail=`기온이 +2.5°C를 넘어 돌이킬 수 없는 상태입니다.<br>통과한 CO₂: ${gameState.leaked}개`;
  }
  content.innerHTML = `
    <h2>${msg}</h2>
    <p style="font-size:48px; margin:10px 0;">${grade}등급</p>
    <p>${detail}</p>
    <p style="font-size:14px; color:#888;">
      처치한 CO₂: ${gameState.totalKills}개 | 배치한 타워: ${gameState.towers.length}개 | 남은 예산: ${gameState.budget}억
    </p><br>
    <button class="btn-primary" onclick="location.reload()">🔄 다시 도전</button>
  `;
  document.getElementById('overlay').classList.add('show');
}

         <span>저렴 + 연구력 보너스</span>
       </div>
     </div>
     <div class="tut-tower-item">
       <span class="tut-icon">🔬</span>
       <div class="tut-info">
         <strong>탄소 포집</strong> <span style="color:#FFD740">120억</span><br>
         <span>비싸지만 강력한 한 방</span>
       </div>
     </div>
     <div class="tut-tower-item" style="grid-column: 1 / -1;">
       <span class="tut-icon">📜</span>
       <div class="tut-info">
         <strong>탄소세 정책</strong> <span style="color:#FFD740">90억</span><br>
         <span>CO₂ 이동 속도를 30% 느리게! (다른 기술과 조합하면 효과적)</span>
       </div>
     </div>
   </div>
   <div style="margin-top:15px; padding:12px; background:rgba(255,235,59,0.1); border-radius:10px; border:1px solid rgba(255,235,59,0.3)">
     <p style="font-size:14px; color:#ffd740; margin:0">
       ⚡ <b>전략 팁</b>: CO₂를 처치하면 예산을 얻습니다!<br>
       <span style="font-size:12px; color:#aaa">경로가 꺾이는 코너에 배치하면 CO₂를 오래 공격할 수 있어요.</span>
     </p>
   </div>`
];

function showIntro() {
  tutPage = 0;
  renderTutPage();
  document.getElementById('overlay').classList.add('show');
}

function renderTutPage() {
  const content = document.getElementById('overlayContent');
  const isLast = tutPage === tutPages.length-1;
  const isFirst = tutPage === 0;
  let dots = '<div class="tut-page-dots">';
  for (let i=0; i<tutPages.length; i++) dots += `<div class="tut-dot ${i===tutPage?'active':''}"></div>`;
  dots += '</div>';
  let buttons = '';
  if (!isFirst) buttons += `<button class="btn-secondary" onclick="tutPrev()">← 이전</button>`;
  buttons += isLast
    ? `<button class="btn-primary" onclick="document.getElementById('overlay').classList.remove('show')">🎮 게임 시작!</button>`
    : `<button class="btn-primary" onclick="tutNext()">다음 →</button>`;
  content.innerHTML = tutPages[tutPage] + dots + '<div style="margin-top:8px">' + buttons + '</div>';
}
function tutNext() { if (tutPage < tutPages.length-1) { tutPage++; renderTutPage(); } }
function tutPrev() { if (tutPage > 0) { tutPage--; renderTutPage(); } }

// ===== 게임 루프 =====
function gameLoop() {
  frameCount++;
  if (!gameState.gameOver) {
    updateSpawning();
    updateEnemies();
    updateTowers();
    updateProjectiles();
    updateParticles();
    checkWaveEnd();
    updateUI();
  }
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== 초기화 =====
loadSprites(() => {
  resizeCanvas();
  if (bonusResearch > 0) gameState.research = bonusResearch;
  renderShop();
  updateUI();
  showIntro();
  gameLoop();
});
</script>
